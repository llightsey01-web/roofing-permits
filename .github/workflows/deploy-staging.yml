name: Deploy to Staging
on:
  push:
    branches: [staging]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run test:unit
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.STAGING_CREDENTIAL_ENCRYPTION_KEY }}
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Tests passed — Railway auto-deploys staging branch
        run: echo "Railway deploys staging branch automatically"
